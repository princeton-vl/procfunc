# procfunc 0.30 -> 0.31 codemods. Apply:  ast-grep scan -r scripts/update_greps/to_0.31.yml -U <path>
# (on macOS `sg` is the setgroup binary -- use `ast-grep`). Then run `ruff format`. Subtree moves,
# a/b kwarg renames, and the codegen import move are auto. The locate-only rules at the bottom
# (no fix:) flag context-dependent splits to hand-edit: fillet_curve, vector_math, combine_color,
# distribute_points_on_faces. See README.md for those + newly-required primary inputs + removed
# namespaces.

id: func-combine_xyz-to-math
language: python
rule:
  pattern: pf.nodes.func.combine_xyz
fix: pf.nodes.math.combine_xyz
