id: boolean-mesh1-to-a
language: python
rule:
  pattern:
    context: 'f(mesh_1=$V)'
    selector: keyword_argument
  inside:
    kind: call
    stopBy: end
    has: { field: function, regex: 'mesh_boolean$|sdf_grid_boolean$' }
fix: 'a=$V'
---
id: boolean-mesh2-to-b
language: python
rule:
  pattern:
    context: 'f(mesh_2=$V)'
    selector: keyword_argument
  inside:
    kind: call
    stopBy: end
    has: { field: function, regex: 'mesh_boolean$|sdf_grid_boolean$' }
fix: 'b=$V'
---
id: compositor-image0-to-a
language: python
rule:
  pattern:
    context: 'f(image_0=$V)'
    selector: keyword_argument
  inside:
    kind: call
    stopBy: end
    has: { field: function, regex: 'mix_rgb$|alpha_over$|diff_matte$|split$' }
fix: 'a=$V'
---
id: compositor-image1-to-b
language: python
rule:
  pattern:
    context: 'f(image_1=$V)'
    selector: keyword_argument
  inside:
    kind: call
    stopBy: end
    has: { field: function, regex: 'mix_rgb$|alpha_over$|diff_matte$|split$' }
fix: 'b=$V'
---
id: math-value2-to-c
language: python
rule:
  pattern:
    context: 'f(value_2=$V)'
    selector: keyword_argument
  inside:
    kind: call
    stopBy: end
    has: { field: function, regex: '_math$' }
fix: 'c=$V'
---
# LOCATE-ONLY (no fix:) -- context-dependent splits/removals; hand-edit per README.
# fillet_curve(mode=...) split into fillet_curve_poly / fillet_curve_bezier (drop the mode= line).
id: locate-fillet_curve-split
language: python
rule:
  pattern: pf.nodes.geo.fillet_curve($$$A)
---
# shader.vector_math split by operation -> math.vector_multiply / vector_multiply_add / ... .
id: locate-vector_math-split
language: python
rule:
  pattern: pf.nodes.shader.vector_math($$$A)
---
# compositor.combine_color removed -> color.combine_rgb (+ optional compositor.set_alpha).
id: locate-compositor-combine_color
language: python
rule:
  pattern: pf.nodes.compositor.combine_color($$$A)
---
# distribute_points_on_faces(mode=...) split -> ..._poisson (density= -> density_factor=, add distance_min=).
id: locate-distribute_points_on_faces
language: python
rule:
  pattern: pf.nodes.geo.distribute_points_on_faces($$$A)
