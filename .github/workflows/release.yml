name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:

  pypi:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    if: github.repository == 'princeton-vl/procfunc'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - run: uv publish --trusted-publishing always
