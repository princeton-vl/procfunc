name: Release

on:
  release:
    types: [published]

jobs:
  testpypi:
    runs-on: ubuntu-latest
    environment: release-testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - run: uv publish --publish-url https://test.pypi.org/legacy/ --trusted-publishing always

  pypi:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    if: ${{ !contains(github.ref_name, 'dev') && !contains(github.ref_name, 'rc') }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - run: uv publish --trusted-publishing always
